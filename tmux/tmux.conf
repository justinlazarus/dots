# =========================================
# Terminal Settings
# =========================================
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB"

# =========================================
# Prefix Key Configuration
# =========================================
unbind C-b
set-option -g prefix C-k
bind-key C-k send-prefix


# =========================================
# Key Bindings
# =========================================
# Copy mode (vim mode)
bind [ copy-mode

# Copy mode vim-style selection and yanking
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Paste from system clipboard
bind P paste-buffer

# Window splitting
bind | split-window -h
bind - split-window -v

# Reload config file
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Kill pane/window without confirmation
bind x kill-pane
bind X kill-window

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (vim-style with repeatable keys)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# =========================================
# Window & Pane Settings
# =========================================
setw -g mode-keys vi
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on
set -g detach-on-destroy off

# =========================================
# Catppuccin Theme (Mocha)
# =========================================
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_tabs_enabled 'on'
set -g @catppuccin_user 'off'
set -g @catppuccin_date_time 'off'

# Status bar
set -g status-interval 2
set -g status-position top
set -g status-left-length 100
set -g status-right ""

# =========================================
# Custom Bindings
# =========================================
bind-key g display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "~/dots/utils/wt.sh"
bind-key w display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "~/dots/utils/wm.sh"

# =========================================
# Plugins
# =========================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Override status after plugin sets its defaults
set -g status-style "bg=#1e1e2e"
set -g status-left "#[fg=#1e1e2e,bg=#a6e3a1]#S "
set -g status-right-length 200
set -g status-right "#(~/dots/utils/gitmux-padded.sh \"#{pane_current_path}\")"

# Window names: simple rectangles, left-aligned
set -g status-justify left
setw -g window-status-format "#[fg=#89b4fa,bg=#313244] #W "
setw -g window-status-current-style "bg=default"
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#fab387] #W " 
